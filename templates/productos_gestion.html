<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Roboto',Arial,sans-serif;background:#f6f7fb;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.container{background:#fff;padding:2.5rem 2rem 2rem 2rem;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);min-width:340px;max-width:500px;text-align:center;}h2{margin-top:0;font-weight:700;color:#222;letter-spacing:0.5px;}.btn{background:#4f8cff;color:#fff;border:none;border-radius:8px;padding:0.8rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;}.btn:hover{background:#2563eb;}.product-list{margin-top:2rem;text-align:left;}.product-item{display:flex;justify-content:space-between;align-items:center;padding:0.7rem 0.5rem;border-bottom:1px solid #ececec;}.product-actions button{margin-left:0.5rem;}</style>
</head>
<body>
    <div class="container">
        <h2>Gestionar Productos</h2>
        <form method="POST" action="/productos/agregar" autocomplete="off">
            <input type="text" name="nombre" required placeholder="Nombre del producto">
            <input type="number" name="precio" required min="0" step="0.01" placeholder="Precio base (CRC)">
            <button class="btn" type="submit">Agregar producto</button>
        </form>
        <div class="product-list">
            <h3>Productos registrados:</h3>
            {% for producto in productos %}
            <div class="product-item">
                <div>
                    <strong>{{ producto['nombre'] }}</strong> - ₡{{ producto['precio'] }}
                </div>
                <div class="product-actions">
                    <form method="POST" action="/productos/modificar" style="display:inline;">
                        <input type="hidden" name="id" value="{{ loop.index0 }}">
                        <input type="text" name="nuevo_nombre" placeholder="Nuevo nombre" style="width:100px;">
                        <input type="number" name="nuevo_precio" placeholder="Nuevo precio" min="0" step="0.01" style="width:80px;">
                        <button class="btn" type="submit">Modificar</button>
                    </form>
                    <form method="POST" action="/productos/borrar" style="display:inline;">
                        <input type="hidden" name="id" value="{{ loop.index0 }}">
                        <button class="btn" type="submit" style="background:#e53e3e;">Borrar</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
        <form method="GET" action="/productos/consultar" style="margin-top:2rem;">
            <input type="text" name="consulta" placeholder="Nombre del producto">
            <button class="btn" type="submit">Consultar producto</button>
        </form>
        {% if consulta_resultado %}
        <div class="messages" style="margin-top:1.5rem;">
            <div class="success">{{ consulta_resultado }}</div>
        </div>
        {% endif %}
        <a href="/dashboard" class="btn" style="margin-top:2rem;background:#e5e7eb;color:#222;">Volver al menú</a>
    </div>
</body>
</html>
