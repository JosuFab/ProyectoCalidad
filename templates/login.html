<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - ATI Logística Aduanera</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #f6f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 2.5rem 2rem 2rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            min-width: 340px;
            max-width: 360px;
        }
        h2 {
            margin-top: 0;
            font-weight: 700;
            color: #222;
            letter-spacing: 0.5px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        label {
            font-size: 1rem;
            color: #444;
        }
        input[type="email"] {
            padding: 0.7rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            background: #f9fafb;
            transition: border 0.2s;
        }
        input[type="email"]:focus {
            border: 1.5px solid #4f8cff;
            outline: none;
        }
        .btn {
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .file-upload {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .messages {
            margin-bottom: 1rem;
        }
        .success {
            color: #256029;
            background: #e6f4ea;
            border: 1px solid #b7e4c7;
            padding: 0.7rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .error {
            color: #a94442;
            background: #fbeaea;
            border: 1px solid #f5c6cb;
            padding: 0.7rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .register-link {
            margin-top: 2rem;
            text-align: center;
        }
        .register-link a {
            color: #4f8cff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Inicio de Sesión</h2>
        <div class="messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="{{ category }}">{{ message|safe }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
        <form method="POST" action="/" autocomplete="off">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            <button class="btn" type="submit">Iniciar sesión</button>
        </form>
        <form class="file-upload" method="POST" action="/login/cargar" enctype="multipart/form-data">
            <label for="file">Cargar datos de usuario (.txt):</label>
            <input type="file" id="file" name="file" accept=".txt">
            <button class="btn" type="submit">Cargar archivo</button>
        </form>
        <div class="register-link">
            ¿No tienes cuenta? <a href="/registrar">Regístrate aquí</a>
        </div>
    </div>
</body>
</html>
