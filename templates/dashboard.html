<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Principal - ATI Logística Aduanera</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #f6f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 2.5rem 2rem 2rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            min-width: 340px;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            font-weight: 700;
            color: #222;
            letter-spacing: 0.5px;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }
        .btn {
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .logout {
            margin-top: 2rem;
            color: #4f8cff;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Panel Principal</h2>
        <div class="menu">
            <a href="/productos" class="btn">Gestionar Productos</a>
            <a href="/paises" class="btn">Gestionar Países</a>
            <a href="/precios_impuestos" class="btn">Registrar Precios e Impuestos</a>
            <a href="/consulta" class="btn">Consultar Información</a>
        </div>
        <a href="/logout" class="logout">Cerrar sesión</a>
    </div>
</body>
</html>
