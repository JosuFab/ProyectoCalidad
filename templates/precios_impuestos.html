<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Precios e Impuestos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Roboto',Arial,sans-serif;background:#f6f7fb;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.container{background:#fff;padding:2.5rem 2rem 2rem 2rem;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);min-width:340px;max-width:400px;text-align:center;}h2{margin-top:0;font-weight:700;color:#222;letter-spacing:0.5px;}.btn{background:#4f8cff;color:#fff;border:none;border-radius:8px;padding:0.8rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;}.btn:hover{background:#2563eb;}.form-group{margin-bottom:1.2rem;text-align:left;}</style>
</head>
<body>
    <div class="container">
        <h2>Registrar Precios e Impuestos</h2>
        <form method="POST" action="/precios_impuestos/agregar" autocomplete="off">
            <div class="form-group">
                <label>Producto:</label>
                <select name="producto_precio" required>
                    <option value="">Seleccione</option>
                    {% for producto in productos %}
                    <option value="{{ producto['nombre'] }}">{{ producto['nombre'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>País:</label>
                <select name="pais_precio" required>
                    <option value="">Seleccione</option>
                    {% for pais in paises %}
                    <option value="{{ pais }}">{{ pais }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Moneda:</label>
                <select name="moneda_precio" required>
                    <option value="">Seleccione</option>
                    {% for moneda in monedas %}
                    <option value="{{ moneda }}">{{ moneda }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Precio:</label>
                <input type="number" name="precio_valor" required min="0" step="0.01" placeholder="Precio">
            </div>
            <div class="form-group">
                <label>Impuesto (ej: 0.13 para 13%):</label>
                <input type="number" name="impuesto_valor" required min="0" step="0.01" placeholder="Impuesto">
            </div>
            <button class="btn" type="submit">Registrar</button>
        </form>
        <a href="/dashboard" class="btn" style="margin-top:2rem;background:#e5e7eb;color:#222;">Volver al menú</a>
    </div>
</body>
</html>
